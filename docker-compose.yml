version: '3.8'

services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    env_file:
      - .env
    volumes:
      - n8n_data:/home/node/.n8n
      - ./workflows_backup:/backup
      - ./custom_nodes:/home/node/.n8n/custom
    networks:
      - n8n-net

  kvstore:
    image: python:3.11-slim
    container_name: kvstore
    restart: unless-stopped
    ports:
      - "3456:3456"
    volumes:
      - ./kv_store.py:/app/kv_store.py:ro
    command: python3 /app/kv_store.py
    networks:
      - n8n-net

volumes:
  n8n_data:
    driver: local

networks:
  n8n-net:
    driver: bridge
