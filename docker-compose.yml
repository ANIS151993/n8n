services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    env_file:
      - .env
    volumes:
      - n8n_data:/home/node/.n8n
      - ./workflows_backup:/backup
      - ./custom_nodes:/home/node/.n8n/custom
    networks:
      - n8n-net

volumes:
  n8n_data:
    driver: local

networks:
  n8n-net:
    driver: bridge
